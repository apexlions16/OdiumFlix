name: Build OdiumFlix
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web-and-studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - run: npm install --prefix apps/web
      - run: npm install --prefix apps/studio
      - run: npm run build --prefix apps/web
      - run: npm run build --prefix apps/studio
      - uses: actions/upload-artifact@v4
        with: {name: odiumflix-web, path: apps/web/dist}
      - uses: actions/upload-artifact@v4
        with: {name: odiumflix-studio, path: apps/studio/dist}

  mobile-preview:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - run: npm install --prefix apps/mobile
      - run: npx expo export --platform web
        working-directory: apps/mobile
      - uses: actions/upload-artifact@v4
        with: {name: odiumflix-mobile-preview, path: apps/mobile/dist}

  desktop-packages:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix: {os: [windows-latest, macos-latest, ubuntu-latest]}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - run: npm install --prefix apps/web
      - run: npm run build --prefix apps/web
      - run: npm install --prefix apps/desktop
      - run: npm run package --prefix apps/desktop
      - uses: actions/upload-artifact@v4
        with: {name: odiumflix-desktop-${{ matrix.os }}, path: apps/desktop/release}
