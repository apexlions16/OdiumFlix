name: Release OdiumFlix Alpha

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_VERSION: 0.2.0-alpha.1
  RELEASE_TAG: v0.2.0-alpha.1

jobs:
  web-packages:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build viewer web
        run: |
          npm install --prefix apps/web
          npm run build --prefix apps/web
      - name: Build Studio web
        run: |
          npm install --prefix apps/studio
          npm run build --prefix apps/studio
      - name: Package web builds
        run: |
          mkdir -p release
          (cd apps/web/dist && zip -r ../../../release/OdiumFlix-Web-${RELEASE_VERSION}.zip .)
          (cd apps/studio/dist && zip -r ../../../release/OdiumFlix-Studio-Web-${RELEASE_VERSION}.zip .)
      - uses: actions/upload-artifact@v4
        with:
          name: odiumflix-web-release
          path: release/*
          if-no-files-found: error

  windows-packages:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build web applications used by Electron
        shell: pwsh
        run: |
          npm install --prefix apps/web
          npm run build --prefix apps/web
          npm install --prefix apps/studio
          npm run build --prefix apps/studio
      - name: Build media worker executables
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/media_pipeline/requirements.txt pyinstaller
          pyinstaller --noconfirm --clean --onefile --name odium-media --paths tools/media_pipeline --collect-submodules huggingface_hub --collect-all hf_xet tools/media_pipeline/odium_media.py
          pyinstaller --noconfirm --clean --onefile --name OdiumFlix-Media-Server --paths tools/media_pipeline --collect-submodules huggingface_hub --collect-all hf_xet --collect-submodules fastapi --collect-submodules uvicorn tools/media_pipeline/server.py
          New-Item -ItemType Directory -Force apps/studio-desktop/resources | Out-Null
          Copy-Item dist/odium-media.exe apps/studio-desktop/resources/odium-media.exe
          Copy-Item dist/OdiumFlix-Media-Server.exe apps/studio-desktop/resources/OdiumFlix-Media-Server.exe
      - name: Build viewer desktop
        shell: pwsh
        run: |
          npm install --prefix apps/desktop
          npm run package --prefix apps/desktop
      - name: Build Windows Studio
        shell: pwsh
        run: |
          npm install --prefix apps/studio-desktop
          npm run package --prefix apps/studio-desktop
      - name: Collect Windows packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Get-ChildItem apps/desktop/release -Filter *.exe | Copy-Item -Destination release
          Get-ChildItem apps/studio-desktop/release -Filter *.exe | Copy-Item -Destination release
          Copy-Item dist/odium-media.exe release/OdiumFlix-Media-Worker-$env:RELEASE_VERSION.exe
          Copy-Item dist/OdiumFlix-Media-Server.exe release/OdiumFlix-Media-Server-$env:RELEASE_VERSION.exe
      - uses: actions/upload-artifact@v4
        with:
          name: odiumflix-windows-release
          path: release/*
          if-no-files-found: error

  android-packages:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build viewer Android APK
        env:
          CI: '1'
        run: |
          npm install --prefix apps/mobile
          cd apps/mobile
          npx expo prebuild --platform android --no-install
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon
          cd ../../..
          mkdir -p release
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk release/OdiumFlix-Android-${RELEASE_VERSION}.apk
      - name: Build Studio Android APK
        env:
          CI: '1'
        run: |
          npm install --prefix apps/studio-mobile
          cd apps/studio-mobile
          npx expo prebuild --platform android --no-install
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --no-daemon
          cd ../../..
          mkdir -p release
          cp apps/studio-mobile/android/app/build/outputs/apk/debug/app-debug.apk release/OdiumFlix-Studio-Android-${RELEASE_VERSION}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: odiumflix-android-release
          path: release/*
          if-no-files-found: warn

  publish-release:
    if: always() && (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]'))
    needs: [web-packages, windows-packages, android-packages]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: odiumflix-*-release
          path: release-assets
          merge-multiple: true
      - name: Show release files
        run: find release-assets -maxdepth 2 -type f -print || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OdiumFlix ${{ env.RELEASE_TAG }}
          prerelease: true
          body_path: docs/release-alpha.md
          fail_on_unmatched_files: false
          files: release-assets/*
