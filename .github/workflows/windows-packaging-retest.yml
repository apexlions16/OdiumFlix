name: Windows Packaging Retest
on:
  pull_request:
permissions:
  contents: read
jobs:
  studio:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build Studio web
        shell: pwsh
        run: |
          npm install --prefix apps/studio
          npm run build --prefix apps/studio
      - name: Package Studio with captured log
        shell: pwsh
        run: |
          npm install --prefix apps/studio-desktop *>&1 | Tee-Object -FilePath studio-package.log
          if ($LASTEXITCODE -ne 0) { Get-Content studio-package.log -Tail 120; exit $LASTEXITCODE }
          npm run package --prefix apps/studio-desktop *>&1 | Tee-Object -FilePath studio-package.log -Append
          $code = $LASTEXITCODE
          Get-Content studio-package.log -Tail 180
          exit $code
      - name: Upload Studio package log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: studio-package-log
          path: studio-package.log
          if-no-files-found: warn
