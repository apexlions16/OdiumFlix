name: Release OdiumFlix v0.3 Alpha 3

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-odiumflix-alpha3
  cancel-in-progress: false

env:
  RELEASE_VERSION: 0.3.0-alpha.3
  RELEASE_TAG: v0.3.0-alpha.3

jobs:
  web-packages:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build viewer web
        run: |
          npm install --prefix apps/web
          npm run build --prefix apps/web
      - name: Build Studio web
        run: |
          npm install --prefix apps/studio
          npm run build --prefix apps/studio
      - name: Package web builds
        run: |
          mkdir -p release
          (cd apps/web/dist && zip -r ../../../release/OdiumFlix-Web-${RELEASE_VERSION}.zip .)
          (cd apps/studio/dist && zip -r ../../../release/OdiumFlix-Studio-Web-${RELEASE_VERSION}.zip .)
      - uses: actions/upload-artifact@v4
        with:
          name: odiumflix-web-release
          path: release/*
          if-no-files-found: error

  windows-packages:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: windows-latest
    timeout-minutes: 95
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build web applications used by Electron
        shell: pwsh
        run: |
          npm install --prefix apps/web
          npm run build --prefix apps/web
          npm install --prefix apps/studio
          npm run build --prefix apps/studio
      - name: Build media worker executables
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/media_pipeline/requirements.txt pyinstaller
          python -m py_compile tools/media_pipeline/media_common.py tools/media_pipeline/media_metadata.py tools/media_pipeline/media_packaging.py tools/media_pipeline/media_process.py tools/media_pipeline/media_remote.py tools/media_pipeline/odium_media.py tools/media_pipeline/server.py tools/media_pipeline/selftest_lossless.py
          pyinstaller --noconfirm --clean --onefile --name odium-media --paths tools/media_pipeline --collect-submodules huggingface_hub --collect-all hf_xet tools/media_pipeline/odium_media.py
          pyinstaller --noconfirm --clean --onefile --name OdiumFlix-Media-Server --paths tools/media_pipeline --collect-submodules huggingface_hub --collect-all hf_xet --collect-submodules fastapi --collect-submodules uvicorn tools/media_pipeline/server.py
          New-Item -ItemType Directory -Force apps/studio-desktop/resources | Out-Null
          Copy-Item dist/odium-media.exe apps/studio-desktop/resources/odium-media.exe
          Copy-Item dist/OdiumFlix-Media-Server.exe apps/studio-desktop/resources/OdiumFlix-Media-Server.exe
      - name: Build viewer desktop
        shell: pwsh
        run: |
          npm install --prefix apps/desktop
          npm run package --prefix apps/desktop
      - name: Build and verify Windows Studio
        shell: pwsh
        run: |
          npm install --prefix apps/studio-desktop
          $env:ODIUM_FFMPEG=(Resolve-Path apps/studio-desktop/node_modules/ffmpeg-static/ffmpeg.exe).Path
          $env:ODIUM_FFPROBE=(Resolve-Path apps/studio-desktop/node_modules/ffprobe-static/bin/win32/x64/ffprobe.exe).Path
          & dist/odium-media.exe diagnostics
          if ($LASTEXITCODE -ne 0) { throw "Packaged media worker diagnostics failed: $LASTEXITCODE" }
          npm run package --prefix apps/studio-desktop
          $packagedProbe='apps/studio-desktop/release/win-unpacked/resources/media-tools/ffprobe.exe'
          $packagedFfmpeg='apps/studio-desktop/release/win-unpacked/resources/media-tools/ffmpeg.exe'
          if (-not (Test-Path $packagedProbe)) { throw "Packaged ffprobe missing: $packagedProbe" }
          if (-not (Test-Path $packagedFfmpeg)) { throw "Packaged ffmpeg missing: $packagedFfmpeg" }
          & $packagedProbe -version
          if ($LASTEXITCODE -ne 0) { throw "Packaged ffprobe execution failed: $LASTEXITCODE" }
      - name: Collect Windows packages
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Get-ChildItem apps/desktop/release -Filter *.exe | Copy-Item -Destination release
          Get-ChildItem apps/studio-desktop/release -Filter *.exe | Copy-Item -Destination release
          Copy-Item dist/odium-media.exe release/OdiumFlix-Media-Worker-$env:RELEASE_VERSION.exe
          Copy-Item dist/OdiumFlix-Media-Server.exe release/OdiumFlix-Media-Server-$env:RELEASE_VERSION.exe
      - uses: actions/upload-artifact@v4
        with:
          name: odiumflix-windows-release
          path: release/*
          if-no-files-found: error

  android-packages:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    timeout-minutes: 85
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build standalone viewer release APK
        env:
          CI: '1'
        run: |
          npm install --prefix apps/mobile
          cd apps/mobile
          npx expo prebuild --platform android --no-install --clean
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon
          cd ../../..
          mkdir -p release
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk release/OdiumFlix-Android-${RELEASE_VERSION}.apk
      - name: Build standalone Studio release APK
        env:
          CI: '1'
        run: |
          npm install --prefix apps/studio-mobile
          cd apps/studio-mobile
          npx expo prebuild --platform android --no-install --clean
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon
          cd ../../..
          mkdir -p release
          cp apps/studio-mobile/android/app/build/outputs/apk/release/app-release.apk release/OdiumFlix-Studio-Android-${RELEASE_VERSION}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: odiumflix-android-release
          path: release/*
          if-no-files-found: error

  publish-release:
    if: (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')) && needs.web-packages.result == 'success' && needs.windows-packages.result == 'success' && needs.android-packages.result == 'success'
    needs: [web-packages, windows-packages, android-packages]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: odiumflix-*-release
          path: release-assets
          merge-multiple: true
      - name: Create release asset manifest
        env:
          WEB_RESULT: ${{ needs.web-packages.result }}
          WINDOWS_RESULT: ${{ needs.windows-packages.result }}
          ANDROID_RESULT: ${{ needs.android-packages.result }}
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root = Path('release-assets')
          files = [{'name': p.name, 'sizeBytes': p.stat().st_size} for p in sorted(root.glob('*')) if p.is_file()]
          payload = {
              'version': os.environ['RELEASE_VERSION'],
              'tag': os.environ['RELEASE_TAG'],
              'commit': os.environ['GITHUB_SHA'],
              'jobs': {'web': os.environ.get('WEB_RESULT'), 'windows': os.environ.get('WINDOWS_RESULT'), 'android': os.environ.get('ANDROID_RESULT')},
              'assets': files,
          }
          text = json.dumps(payload, ensure_ascii=False, indent=2) + '\n'
          (root / f"OdiumFlix-{os.environ['RELEASE_VERSION']}-manifest.json").write_text(text, encoding='utf-8')
          Path('releases').mkdir(exist_ok=True)
          Path(f"releases/{os.environ['RELEASE_VERSION']}-assets.json").write_text(text, encoding='utf-8')
          print(text)
          PY
      - name: Record release manifest in repository
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add releases/${RELEASE_VERSION}-assets.json
          git commit -m "Record ${RELEASE_TAG} assets [skip ci]" || exit 0
          git push origin HEAD:main
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: OdiumFlix ${{ env.RELEASE_TAG }}
          prerelease: true
          body_path: docs/release-v0.3-alpha.3.md
          fail_on_unmatched_files: true
          files: release-assets/*
